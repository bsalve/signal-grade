<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignalGrade — Search Visibility Audit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0b0c0e;
      --bg2:    #111214;
      --border: #1e2025;
      --dim2:   #2a2d35;
      --text:   #e4e6ea;
      --muted:  #8892a4;
      --dim:    #252830;
      --accent: #4d9fff;
      --warn:   #ffb800;
      --fail:   #ff4455;
      --pass:   #34d399;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Space Mono: scores, data values, CLI elements ── */
    .meta-label, .meta-checks, .display-tag, .display-heading,
    .grade-display, .score-counter-row, .stat-n,
    .card-score-val, .row-score-val, .cat-score-num,
    .status-line, .input-prefix, #urlInput, #auditBtn, .rec-btn {
      font-family: 'Space Mono', monospace;
    }

    #app { position: relative; z-index: 1; }

    /* ═══════════════════════════════
       HERO / INPUT
    ═══════════════════════════════ */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 56px 56px;
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: absolute;
      top: 48px;
      left: 56px;
      right: 56px;
    }
    .meta-label { font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
    .meta-label span { color: var(--accent); }
    .meta-checks { font-size: 11px; letter-spacing: 0.1em; color: var(--muted); }
    .meta-dot { opacity: 0.4; }
    .cat-tag { letter-spacing: 0.12em; font-weight: 700; }
    .cat-tag.cat-technical { color: #8892a4; }
    .cat-tag.cat-content   { color: #e8a87c; }
    .cat-tag.cat-aeo       { color: #7baeff; }
    .cat-tag.cat-geo       { color: #b07bff; }

    .display-block { padding-top: 0; }

    .display-tag {
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 20px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .display-tag::before, .display-tag::after {
      content: ''; display: inline-block;
      width: 24px; height: 1px; background: var(--accent);
    }

    h1.display-heading {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 700; line-height: 0.95;
      letter-spacing: -0.02em; color: var(--text);
      margin-bottom: 20px;
    }
    h1.display-heading .line2    { color: var(--muted); }
    h1.display-heading .acc      { color: var(--accent); }

    .display-tagline {
      font-family: 'Inter', sans-serif;
      color: var(--muted); font-size: 0.95rem;
      margin: -20px 0 0; letter-spacing: 0.01em;
    }

    /* Mode toggle */
    .mode-toggle {
      display: flex; gap: 0; justify-content: center;
      border: 1px solid var(--dim2); max-width: 280px;
      margin: 0 auto 28px; background: var(--bg2);
    }
    .mode-btn {
      flex: 1; padding: 9px 20px;
      font-family: 'Space Mono', monospace; font-size: 11px;
      font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      background: none; border: none; color: var(--muted); cursor: pointer;
      border-right: 1px solid var(--dim2);
    }
    .mode-btn:last-child { border-right: none; }
    .mode-btn.active { background: var(--dim); color: var(--text); }
    .mode-btn:disabled { cursor: not-allowed; opacity: 0.35; }

    .crawl-limit-note {
      font-size: 11px; color: var(--muted); letter-spacing: 0.06em;
      margin: -18px auto 28px; text-align: center;
    }
    .tier-badge {
      font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; color: var(--muted);
      border: 1px solid var(--dim2); padding: 1px 6px; margin-left: 4px;
      vertical-align: middle;
    }

    /* Customize report panel */
    .customize-row {
      max-width: 720px; margin: 16px auto 0;
      text-align: left;
    }
    .customize-toggle {
      font-size: 11px; color: var(--muted); cursor: pointer;
      background: none; border: none; letter-spacing: 0.08em;
      padding: 0; font-family: 'Inter', sans-serif;
    }
    .customize-toggle:hover { color: var(--text); }
    .customize-panel {
      margin-top: 10px; padding: 14px 16px;
      border: 1px solid var(--border); background: var(--bg2);
    }
    .customize-panel .input-descriptor { margin-bottom: 8px; }
    .logo-input {
      width: 100%; background: var(--bg); border: 1px solid var(--dim2);
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
      padding: 10px 14px; outline: none; caret-color: var(--accent);
    }
    .logo-input:focus { border-color: var(--accent); }
    .logo-input::placeholder { color: var(--muted); }

    /* Input */
    .input-area { margin-top: 48px; }
    .input-descriptor {
      font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
    }
    .input-row {
      display: flex; align-items: stretch;
      border: 1px solid var(--dim2); background: var(--bg2);
      max-width: 720px; margin: 0 auto;
    }
    .input-row:focus-within { border-color: var(--accent); }
    .input-prefix {
      display: flex; align-items: center; padding: 0 16px;
      color: var(--accent); font-size: 13px;
      border-right: 1px solid var(--dim2);
      user-select: none; white-space: nowrap;
    }
    #urlInput {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'Space Mono', monospace;
      font-size: 14px; padding: 16px 20px; caret-color: var(--accent);
    }
    #urlInput::placeholder { color: var(--muted); }
    #auditBtn {
      background: var(--accent); color: #000; border: none;
      font-family: 'Space Mono', monospace; font-size: 12px;
      font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 0 28px; cursor: pointer; white-space: nowrap;
    }
    #auditBtn:hover    { background: #76baff; }
    #auditBtn:disabled { background: #1a3a5c; color: #3a6fa8; cursor: not-allowed; }

    /* Status / steps */
    #statusArea { margin-top: 24px; max-width: 720px; min-height: 48px; margin-left: auto; margin-right: auto; }

    .status-line {
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; color: var(--muted);
    }
    .status-line.error-line { color: var(--fail); }
    .prompt-char { color: var(--accent); }
    .cursor {
      display: inline-block; width: 8px; height: 13px;
      background: var(--accent); vertical-align: middle; margin-left: 4px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .progress-track {
      margin-top: 10px; height: 3px;
      background: var(--border); border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%; background: var(--accent);
      border-radius: 2px; transition: width 0.85s ease;
    }

    /* ═══════════════════════════════
       RESULTS SECTION
    ═══════════════════════════════ */
    #results {
      display: none;
      padding: 0 56px 80px;
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
      opacity: 0;
    }
    #results.visible {
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .results-divider {
      border: none; border-top: 1px solid var(--border); margin-bottom: 56px;
    }

    /* Score hero */
    .score-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 48px;
    }

    .grade-display {
      font-size: clamp(80px, 12vw, 140px);
      font-weight: 700; line-height: 1; letter-spacing: -0.04em;
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
    }
    .grade-display.in { opacity: 1; transform: translateY(0); }
    .grade-A { color: var(--pass); }
    .grade-B { color: #4d9fff; }
    .grade-C { color: var(--warn); }
    .grade-D { color: #ff8800; }
    .grade-F { color: var(--fail); }

    .score-right {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.5s ease 0.25s, transform 0.5s ease 0.25s;
    }
    .score-right.in { opacity: 1; transform: translateY(0); }

    .score-counter-row {
      font-size: clamp(40px, 6vw, 64px);
      font-weight: 700; line-height: 1; margin-bottom: 10px;
    }
    .score-counter-row span { font-size: 22px; font-weight: 400; color: var(--muted); }
    .score-summary-text { font-size: 13px; color: var(--muted); margin-bottom: 24px; font-style: italic; }

    .meter-track {
      height: 4px; background: var(--dim2); max-width: 440px;
      margin: 0 auto 6px; overflow: hidden;
    }
    .meter-fill { height: 100%; width: 0; transition: width 1.2s cubic-bezier(.16,1,.3,1); }
    .meter-ticks {
      display: flex; justify-content: space-between; max-width: 440px;
      font-size: 10px; color: var(--muted); margin: 0 auto;
    }

    /* Stats row */
    .stats-row {
      display: flex; border: 1px solid var(--border); max-width: 420px;
      margin: 0 auto 48px;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.5s ease 0.4s, transform 0.5s ease 0.4s;
    }
    .stats-row.in { opacity: 1; transform: translateY(0); }
    .stat-cell { flex: 1; padding: 18px 20px; border-right: 1px solid var(--border); }
    .stat-cell:last-child { border-right: none; }
    .stat-n { font-size: 32px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .stat-l { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
    .stat-pass .stat-n { color: var(--pass); }
    .stat-warn .stat-n { color: var(--warn); }
    .stat-fail .stat-n { color: var(--fail); }

    /* Category score cards */
    .cat-scores-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border: 1px solid var(--border);
      max-width: 560px;
      margin: 0 auto 48px;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.5s ease 0.5s, transform 0.5s ease 0.5s;
    }
    .cat-scores-row.in { opacity: 1; transform: translateY(0); }
    .cat-score-cell {
      padding: 14px 16px;
      border-right: 1px solid var(--border);
      background: var(--bg2);
    }
    .cat-score-cell:last-child { border-right: none; }
    .cat-score-name {
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .cat-score-num {
      font-size: 20px; font-weight: 700; line-height: 1; color: var(--text); margin-bottom: 2px;
    }
    .cat-score-denom { font-size: 10px; font-weight: 400; color: var(--muted); }
    .cat-score-grade {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 8px;
    }
    .cat-mini-track { height: 3px; background: var(--dim2); overflow: hidden; }
    .cat-mini-fill  { height: 100%; }

    /* PDF download */
    .pdf-link {
      display: inline-flex; align-items: center; gap: 10px;
      border: 1px solid var(--dim2); padding: 12px 20px;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); text-decoration: none; margin-bottom: 48px;
      opacity: 0; transition: opacity 0.4s ease 0.5s;
    }
    .pdf-link.in  { opacity: 1; }
    .pdf-link:hover { border-color: var(--accent); background: rgba(77,159,255,0.06); }
    .pdf-link svg { width: 14px; height: 14px; fill: currentColor; }

    /* ── Horizontal card strip ── */
    .cards-label {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
      opacity: 0; transition: opacity 0.4s ease 0.55s;
    }
    .cards-label.in { opacity: 1; }
    .cards-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .cards-strip {
      display: flex; gap: 12px;
      overflow-x: auto; padding-bottom: 16px; margin-bottom: 40px;
      scrollbar-width: thin; scrollbar-color: var(--dim2) transparent;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.5s ease 0.6s, transform 0.5s ease 0.6s;
    }
    .cards-strip.in { opacity: 1; transform: translateY(0); }
    .cards-strip::-webkit-scrollbar { height: 4px; }
    .cards-strip::-webkit-scrollbar-thumb { background: var(--dim2); }

    .audit-card {
      flex-shrink: 0; width: 200px;
      background: var(--bg2); border: 1px solid var(--border);
      border-top: 2px solid transparent;
      padding: 16px 18px; cursor: pointer;
      transition: border-color 0.15s;
    }
    .audit-card:hover { border-color: var(--dim2); border-top-color: var(--muted); }
    .audit-card.pass { border-top-color: var(--pass); }
    .audit-card.warn { border-top-color: var(--warn); }
    .audit-card.fail { border-top-color: var(--fail); }

    .card-icon {
      font-size: 16px; font-weight: 700; margin-bottom: 10px; line-height: 1;
    }
    .pass .card-icon { color: var(--pass); }
    .warn .card-icon { color: var(--warn); }
    .fail .card-icon { color: var(--fail); }

    .card-name { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.3; }

    .card-score-val {
      font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 6px;
    }
    .pass .card-score-val { color: var(--pass); }
    .warn .card-score-val { color: var(--warn); }
    .fail .card-score-val { color: var(--fail); }

    .card-bar { height: 2px; background: var(--dim2); margin-bottom: 10px; }
    .card-bar-fill { height: 100%; }
    .pass .card-bar-fill { background: var(--pass); }
    .warn .card-bar-fill { background: var(--warn); }
    .fail .card-bar-fill { background: var(--fail); }

    .card-msg { font-size: 10px; color: var(--muted); line-height: 1.5; }

    /* ── Detail rows ── */
    .detail-label {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
      opacity: 0; transition: opacity 0.4s ease 0.7s;
    }
    .detail-label.in { opacity: 1; }
    .detail-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .result-rows {
      display: flex; flex-direction: column;
      opacity: 0; transition: opacity 0.5s ease 0.75s;
    }
    .result-rows.in { opacity: 1; }

    .result-row {
      border-top: 1px solid var(--border); padding: 20px 0;
      display: grid; grid-template-columns: 18px 1fr auto;
      gap: 16px; align-items: start;
    }
    .result-row:last-child { border-bottom: 1px solid var(--border); }

    .row-status { font-size: 12px; font-weight: 700; margin-top: 2px; }
    .row-status.pass { color: var(--pass); }
    .row-status.warn { color: var(--warn); }
    .row-status.fail { color: var(--fail); }

    .row-name   { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .row-msg    { font-size: 12px; color: var(--muted); white-space: pre-line; margin-bottom: 4px; overflow-wrap: break-word; word-break: break-word; }
    .row-detail { font-size: 11px; color: #6b7585; white-space: pre-line; font-style: italic; overflow-wrap: break-word; word-break: break-word; }

    .row-rec {
      display: none; margin-top: 10px; font-size: 11px; color: var(--muted);
      border-left: 2px solid var(--dim2); padding-left: 12px;
      white-space: pre-line; line-height: 1.7;
    }
    .rec-btn {
      margin-top: 8px; font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); cursor: pointer;
      background: none; border: none; font-family: 'Space Mono', monospace;
      padding: 0;
    }
    .rec-btn:hover { color: var(--text); }

    .row-bar { grid-column: 2 / -1; height: 2px; background: var(--border); margin-top: 6px; }
    .row-bar-fill { height: 100%; }

    .row-score-val {
      font-size: 12px; font-weight: 700; white-space: nowrap; padding-top: 2px; text-align: right;
    }
    .row-score-val.pass { color: var(--pass); }
    .row-score-val.warn { color: var(--warn); }
    .row-score-val.fail { color: var(--fail); }

    /* ── Category separators ── */
    .card-cat-sep {
      flex-shrink: 0; display: flex; align-items: center;
      padding: 0 6px; gap: 0;
    }
    .card-cat-sep-inner {
      writing-mode: vertical-lr; transform: rotate(180deg);
      font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--border); border-left: 1px solid var(--border);
      padding-left: 8px; height: 72px; display: flex; align-items: center;
    }
    .card-cat-sep-inner.cat-technical { color: #8892a4; border-color: var(--border); }
    .card-cat-sep-inner.cat-content   { color: #e8a87c; border-color: #4a3020; }
    .card-cat-sep-inner.cat-aeo       { color: #7baeff; border-color: #2a3a5c; }
    .card-cat-sep-inner.cat-geo       { color: #b07bff; border-color: #3a2a5c; }

    .detail-cat-header {
      font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); padding: 20px 0 6px;
      display: flex; align-items: center; gap: 10px;
      border-top: 1px solid var(--border);
    }
    .detail-cat-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .detail-cat-header.cat-technical { color: #8892a4; }
    .detail-cat-header.cat-content   { color: #e8a87c; }
    .detail-cat-header.cat-aeo       { color: #7baeff; }
    .detail-cat-header.cat-geo       { color: #b07bff; }
    .detail-cat-header .cat-full {
      font-size: 8px; color: var(--muted); letter-spacing: 0.1em; font-style: italic; opacity: 0.6;
    }

    /* ─── Site audit results ─── */
    .site-results-wrap { text-align: left; }

    .site-results-header {
      font-size: 13px; color: var(--muted); margin-bottom: 32px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .site-results-header strong { color: var(--text); }

    .site-summary-stats {
      display: flex; border: 1px solid var(--border); max-width: 420px;
      margin: 0 auto 48px;
    }
    .site-stat-cell { flex: 1; padding: 14px 16px; border-right: 1px solid var(--border); }
    .site-stat-cell:last-child { border-right: none; }
    .site-stat-n {
      font-family: 'Space Mono', monospace; font-size: 24px;
      font-weight: 700; line-height: 1; margin-bottom: 4px;
    }
    .site-stat-l { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .site-stat-fail .site-stat-n { color: var(--fail); }
    .site-stat-warn .site-stat-n { color: var(--warn); }
    .site-stat-pass .site-stat-n { color: var(--pass); }

    .site-issue-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .site-issue-cat { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
    .site-issue-cat.cat-technical { color: #8892a4; }
    .site-issue-cat.cat-content   { color: #e8a87c; }
    .site-issue-cat.cat-aeo       { color: #7baeff; }
    .site-issue-cat.cat-geo       { color: #b07bff; }

    .site-issue-counts {
      font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
      white-space: nowrap; padding-top: 2px; display: flex;
      flex-direction: column; align-items: flex-end; gap: 3px;
    }
    .site-count-fail { color: var(--fail); }
    .site-count-warn { color: var(--warn); }
    .site-count-pass { color: var(--pass); }

    .site-issue-urls {
      display: none; margin-top: 10px;
      font-size: 11px; color: var(--muted); line-height: 1.8;
      border-left: 2px solid var(--dim2); padding-left: 12px;
      overflow-wrap: break-word; word-break: break-all;
    }

    .site-row-clickable { cursor: pointer; }
    .site-row-clickable:hover .site-issue-name { color: var(--accent); }

    .site-grade-block {
      text-align: center; padding: 24px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 32px;
    }
    .site-grade-letter {
      font-family: 'Space Mono', monospace; font-size: 64px; font-weight: 700; line-height: 1;
    }
    .site-grade-score {
      font-family: 'Space Mono', monospace; font-size: 18px; margin-top: 8px;
    }
    .site-grade-label {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 6px;
    }
    .site-top-pct {
      font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
      color: var(--fail); white-space: nowrap; text-align: right; padding-top: 2px;
    }
    .site-working-toggle {
      margin-top: 32px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--pass); cursor: pointer; background: none; border: none;
      font-family: 'Space Mono', monospace; padding: 0; display: block; width: 100%;
      text-align: left;
    }
    .site-working-toggle:hover { opacity: 0.8; }
    .site-working-rows { display: none; margin-top: 12px; }
  </style>
</head>
<body>
<div id="app">

  <!-- HERO -->
  <section class="hero">
    <div class="meta-row">
      <div class="meta-label">SIGNAL<span>GRADE</span></div>
      <div class="meta-checks"><span class="cat-tag cat-technical">Technical</span> <span class="meta-dot">·</span> <span class="cat-tag cat-content">Content</span> <span class="meta-dot">·</span> <span class="cat-tag cat-aeo">AEO</span> <span class="meta-dot">·</span> <span class="cat-tag cat-geo">GEO</span> <span class="meta-dot">·</span> <span id="checkCount">39</span> CHECKS · PDF OUTPUT</div>
    </div>

    <div class="display-block">
      <div class="display-tag">Search Visibility Audit</div>
      <h1 class="display-heading">
        AUDIT YOUR<br>
        <span class="line2"><span class="acc">SEARCH</span></span><br>
        <span class="line2">VISIBILITY</span>
      </h1>
      <p class="display-tagline">Score your site across Google, and across AI.</p>

      <div class="input-area">
        <div class="mode-toggle">
          <button class="mode-btn active" id="modePageBtn" onclick="setMode('page')">Page Audit</button>
          <button class="mode-btn" id="modeSiteBtn" onclick="setMode('site')">Site Audit</button>
        </div>
        <div class="crawl-limit-note" id="crawlLimitNote" style="display:none">
          Up to 50 pages per crawl<span class="tier-badge">FREE</span>
        </div>

        <div class="input-descriptor">Target URL</div>
        <div class="input-row">
          <div class="input-prefix">$ audit</div>
          <input type="url" id="urlInput" placeholder="https://yoursite.com"
                 autocomplete="off" spellcheck="false" />
          <button id="auditBtn">Run →</button>
        </div>

        <div class="customize-row">
          <button class="customize-toggle" onclick="toggleCustomize()">+ Customize Report</button>
          <div class="customize-panel" id="customizePanel" style="display:none">
            <div class="input-descriptor">Agency Logo URL (optional)</div>
            <input type="url" id="logoUrlInput" class="logo-input"
                   placeholder="https://youragency.com/logo.png"
                   autocomplete="off" spellcheck="false" />
          </div>
        </div>

        <div id="statusArea">
          <div id="statusLine" class="status-line" style="display:none">
            <span class="prompt-char">&gt;</span>
            <span id="statusText"></span>
            <span class="cursor"></span>
          </div>
          <div id="progressTrack" class="progress-track" style="display:none">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <div id="errorLine" class="status-line error-line" style="display:none">
            <span class="prompt-char">!</span>
            <span id="errorText"></span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- RESULTS -->
  <section id="results">
    <hr class="results-divider" />
    <div id="resultsInner"></div>
  </section>

</div>
<script>
  /* ── Mode toggle ── */
  let currentMode = 'page';
  function setMode(mode) {
    currentMode = mode;
    document.getElementById('modePageBtn').classList.toggle('active', mode === 'page');
    document.getElementById('modeSiteBtn').classList.toggle('active', mode === 'site');
    document.getElementById('crawlLimitNote').style.display = mode === 'site' ? 'block' : 'none';
  }

  /* ── Customize panel ── */
  function toggleCustomize() {
    const panel = document.getElementById('customizePanel');
    const btn   = document.querySelector('.customize-toggle');
    const open  = panel.style.display === 'block';
    panel.style.display = open ? 'none' : 'block';
    btn.textContent     = open ? '+ Customize Report' : '− Customize Report';
  }

  /* ── Step cycling ── */
  const STEPS = [
    'Resolving domain',
    'Fetching page HTML',
    '[Technical] Checking SSL certificate',
    '[Technical] Scanning robots.txt & sitemap',
    '[Technical] Checking canonical URL',
    '[Technical] Checking meta robots',
    '[Technical] Checking internal links',
    '[Technical] Analyzing structured data',
    '[Technical] Checking business hours schema',
    '[Technical] Checking aggregate rating schema',
    '[Technical] Checking geo coordinates',
    '[Technical] Querying PageSpeed Insights',
    '[Technical] Checking mobile friendliness',
    '[Technical] Checking Core Web Vitals',
    '[Technical] Checking hreflang / i18n tags',
    '[Technical] Checking for broken internal links',
    '[Technical] Checking for redirect chains',
    '[Technical] Checking for mixed content',
    '[Technical] Checking security headers',
    '[Technical] Checking compression',
    '[Technical] Checking favicon',
    '[Technical] Checking image dimensions',
    '[Technical] Checking breadcrumb schema',
    '[Technical] Measuring response time',
    '[Technical] Checking mobile viewport tag',
    '[Technical] Checking page indexability',
    '[Technical] Inventorying structured data types',
    '[Technical] Validating schema required fields',
    '[Technical] Checking image lazy loading',
    '[Technical] Detecting HTTP version',
    '[Technical] Checking robots.txt safety',
    '[Technical] Checking canonical chain',
    '[Content] Auditing meta tags',
    '[Content] Checking title tag',
    '[Content] Checking meta description',
    '[Content] Checking H1 headings',
    '[Content] Checking heading hierarchy',
    '[Content] Analyzing content length',
    '[Content] Checking image alt text',
    '[Content] Auditing Open Graph & social tags',
    '[Content] Checking brand consistency',
    '[Content] Checking NAP consistency',
    '[Content] Checking social media links',
    '[Content] Checking readability score',
    '[Content] Checking content freshness',
    '[Content] Checking outbound links',
    '[Content] Checking calls to action',
    '[Content] Checking image optimization',
    '[Content] Checking og:image reachability',
    '[Content] Analyzing keyword frequency',
    '[AEO] Checking FAQ & question schema',
    '[AEO] Checking speakable markup',
    '[AEO] Analyzing question-based headings',
    '[AEO] Checking video schema',
    '[AEO] Checking how-to schema',
    '[AEO] Checking featured snippet format',
    '[AEO] Checking article schema',
    '[AEO] Checking definition content',
    '[AEO] Checking concise answer paragraphs',
    '[GEO] Auditing E-E-A-T signals',
    '[GEO] Checking organization entity clarity',
    '[GEO] Analyzing structured content',
    '[GEO] Checking privacy & trust signals',
    '[GEO] Checking Google Business Profile link',
    '[GEO] Checking source citations',
    '[GEO] Checking service / product schema',
    '[GEO] Checking author schema',
    '[GEO] Checking review content',
    '[GEO] Checking service area content',
    '[GEO] Checking multi-modal content',
    'Calculating score',
    'Generating PDF report',
  ];
  document.getElementById('checkCount').textContent = STEPS.filter(s => s.startsWith('[')).length;

  let stepInterval = null, currentStep = 0;

  function updateProgress() {
    const pct = Math.round((currentStep / STEPS.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    const label = STEPS[Math.min(currentStep, STEPS.length - 1)];
    document.getElementById('statusText').textContent = label + '...';
  }

  function showProgressUI() {
    document.getElementById('statusLine').style.display = 'flex';
    document.getElementById('progressTrack').style.display = 'block';
    document.getElementById('progressFill').style.width = '0%';
  }

  function startSteps() {
    currentStep = 0;
    showProgressUI();
    updateProgress();
    stepInterval = setInterval(() => {
      if (currentStep < STEPS.length - 1) {
        currentStep++;
        updateProgress();
      }
    }, Math.max(500, Math.round(20000 / STEPS.length)));
  }

  function stopSteps() {
    clearInterval(stepInterval);
    document.getElementById('statusLine').style.display = 'none';
    document.getElementById('progressTrack').style.display = 'none';
  }

  /* ── Animated score counter ── */
  function countUp(el, target, duration = 1200) {
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 4); // ease-out-quart
      el.textContent = Math.round(ease * target);
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  /* ── Color helpers ── */
  function letterGrade(n) {
    return n >= 90 ? 'A' : n >= 80 ? 'B' : n >= 70 ? 'C' : n >= 60 ? 'D' : 'F';
  }

  function gradeColor(score) {
    if (score >= 90) return 'var(--pass)';
    if (score >= 80) return '#00ccff';
    if (score >= 70) return 'var(--warn)';
    if (score >= 60) return '#ff8800';
    return 'var(--fail)';
  }

  function statusIcon(s) { return s === 'pass' ? '✓' : s === 'warn' ? '△' : '✕'; }

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Main audit fn ── */
  async function runAudit() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { showError('Enter a URL first.'); return; }
    if (currentMode === 'site') { runSiteAudit(url); return; }

    clearError();
    document.getElementById('auditBtn').disabled = true;
    const results = document.getElementById('results');
    results.style.display = 'none';
    results.classList.remove('visible');
    startSteps();

    try {
      const logoUrl = document.getElementById('logoUrlInput').value.trim();
      const res  = await fetch('/audit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, ...(logoUrl && { logoUrl }) }),
      });
      const data = await res.json();

      // Fill the progress bar to 100% before showing results
      clearInterval(stepInterval);
      currentStep = STEPS.length;
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('statusText').textContent = 'Done.';
      await new Promise(resolve => setTimeout(resolve, 600));
      stopSteps();

      if (!res.ok) { showError(data.error || 'Audit failed.'); return; }
      renderResults(data);
      results.style.display = 'block';
      requestAnimationFrame(() => {
        results.scrollIntoView({ behavior: 'smooth' });
        requestAnimationFrame(() => results.classList.add('visible'));
      });
    } catch (err) {
      stopSteps();
      showError('Network error: ' + err.message);
    } finally {
      document.getElementById('auditBtn').disabled = false;
    }
  }

  function showError(msg) {
    document.getElementById('errorLine').style.display = 'flex';
    document.getElementById('errorText').textContent = msg;
  }
  function clearError() {
    document.getElementById('errorLine').style.display = 'none';
  }

  /* ── Category helpers ── */
  function resultCategory(name) {
    if (name.startsWith('[Technical]')) return 'technical';
    if (name.startsWith('[Content]'))  return 'content';
    if (name.startsWith('[AEO]'))      return 'aeo';
    if (name.startsWith('[GEO]'))      return 'geo';
    return 'technical';
  }
  function categoryOrder(name) {
    return { technical: 0, content: 1, aeo: 2, geo: 3 }[resultCategory(name)] ?? 0;
  }
  const CAT_LABELS = {
    technical: { short: 'Technical', full: 'Site Health & Infrastructure' },
    content:   { short: 'Content',   full: 'Marketing & On-Page Signals' },
    aeo:       { short: 'AEO',       full: 'Answer Engine Optimization' },
    geo:       { short: 'GEO',       full: 'Generative Engine Optimization' },
  };

  /* ── Render results ── */
  function renderResults(data) {
    // Sort: Technical → Content → AEO → GEO, stable within each group
    const results = [...data.results].sort((a, b) => categoryOrder(a.name) - categoryOrder(b.name));

    const pass  = results.filter(r => r.status === 'pass').length;
    const warn  = results.filter(r => r.status === 'warn').length;
    const fail  = results.filter(r => r.status === 'fail').length;
    const color = gradeColor(data.totalScore);

    // Per-category average scores
    function catAvg(prefix) {
      const items = results.filter(r => r.name.startsWith(prefix));
      if (!items.length) return 0;
      return Math.round(items.reduce((s, r) => s + (r.normalizedScore ?? 0), 0) / items.length);
    }
    const catScores = {
      technical: catAvg('[Technical]'),
      content:   catAvg('[Content]'),
      aeo:       catAvg('[AEO]'),
      geo:       catAvg('[GEO]'),
    };

    function catScoreCell(label, score, color) {
      const grade = letterGrade(score);
      return `
        <div class="cat-score-cell" style="border-top:3px solid ${color}">
          <div class="cat-score-name" style="color:${color}">${label}</div>
          <div class="cat-score-num">${score}<span class="cat-score-denom">/100</span></div>
          <div class="cat-score-grade" style="color:${color}">${grade}</div>
          <div class="cat-mini-track"><div class="cat-mini-fill" style="width:${score}%;background:${color}"></div></div>
        </div>`;
    }

    let html = `
      <!-- Score hero -->
      <div class="score-hero">
        <div class="grade-display grade-${data.grade}" id="gradeDisplay">${data.grade}</div>
        <div class="score-right" id="scoreRight">
          <div class="score-counter-row">
            <span id="scoreCounter">0</span><span> / 100</span>
          </div>
          <div class="score-summary-text">${esc(data.summary)}</div>
          <div class="meter-track">
            <div class="meter-fill" id="meterFill" style="background:${color}"></div>
          </div>
          <div class="meter-ticks">
            <span>0</span><span>25</span><span>50</span><span>75</span><span>100</span>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row" id="statsRow">
        <div class="stat-cell stat-pass"><div class="stat-n">${pass}</div><div class="stat-l">Passed</div></div>
        <div class="stat-cell stat-warn"><div class="stat-n">${warn}</div><div class="stat-l">Warnings</div></div>
        <div class="stat-cell stat-fail"><div class="stat-n">${fail}</div><div class="stat-l">Failed</div></div>
      </div>

      <!-- Category scores -->
      <div class="cat-scores-row" id="catScoresRow">
        ${catScoreCell('Technical', catScores.technical, '#8892a4')}
        ${catScoreCell('Content',   catScores.content,   '#e8a87c')}
        ${catScoreCell('AEO',       catScores.aeo,       '#7baeff')}
        ${catScoreCell('GEO',       catScores.geo,       '#b07bff')}
      </div>

      <!-- PDF download -->
      <a class="pdf-link" id="pdfLink" href="/download" download>
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        Download PDF Report
      </a>

      <!-- Horizontal card strip -->
      <div class="cards-label" id="cardsLabel">Check Results</div>
      <div class="cards-strip" id="cardStrip">`;

    let lastCat = null;
    for (const r of results) {
      const cat = resultCategory(r.name);
      if (cat !== lastCat) {
        if (lastCat !== null) {
          html += `<div class="card-cat-sep"><div class="card-cat-sep-inner cat-${cat}">${CAT_LABELS[cat].short}</div></div>`;
        }
        lastCat = cat;
      }
      const hasScore = r.normalizedScore !== null && r.normalizedScore !== undefined;
      const scoreDisplay = hasScore ? r.normalizedScore : '—';
      const barWidth = hasScore ? r.normalizedScore : 0;
      // Strip category prefix from card name display
      const displayName = r.name.replace(/^\[(Technical|Content|AEO|GEO)\]\s*/, '');
      html += `
        <div class="audit-card ${r.status}">
          <div class="card-icon">${statusIcon(r.status)}</div>
          <div class="card-name">${esc(displayName)}</div>
          <div class="card-score-val">${scoreDisplay}${hasScore ? '<span style="font-size:12px;color:var(--muted)">/100</span>' : ''}</div>
          <div class="card-bar"><div class="card-bar-fill" style="width:${barWidth}%"></div></div>
          <div class="card-msg">${esc((r.message || '').split('\n')[0])}</div>
        </div>`;
    }

    html += `</div>

      <!-- Detail rows -->
      <div class="detail-label" id="detailLabel">Detailed Findings</div>
      <div class="result-rows" id="resultRows">`;

    lastCat = null;
    for (let i = 0; i < results.length; i++) {
      const r = results[i];
      const cat = resultCategory(r.name);
      if (cat !== lastCat) {
        const catInfo = CAT_LABELS[cat];
        html += `<div class="detail-cat-header cat-${cat}">${catInfo.short} <span class="cat-full">— ${catInfo.full}</span></div>`;
        lastCat = cat;
      }
      const hasScore = r.normalizedScore !== null && r.normalizedScore !== undefined;
      html += `
        <div class="result-row">
          <div class="row-status ${r.status}">${statusIcon(r.status)}</div>
          <div>
            <div class="row-name">${esc(r.name)}</div>
            ${r.message ? `<div class="row-msg">${esc(r.message)}</div>` : ''}
            ${r.details  ? `<div class="row-detail">${esc(r.details)}</div>` : ''}
            ${r.recommendation ? `
              <button class="rec-btn" onclick="toggleRec(${i})">+ recommendation</button>
              <div class="row-rec" id="rec${i}">${esc(r.recommendation)}</div>` : ''}
            ${hasScore ? `<div class="row-bar"><div class="row-bar-fill" style="width:${r.normalizedScore}%;background:${r.status === 'pass' ? 'var(--pass)' : r.status === 'warn' ? 'var(--warn)' : 'var(--fail)'}"></div></div>` : ''}
          </div>
          <div class="row-score-val ${r.status}">${hasScore ? r.normalizedScore + '/100' : ''}</div>
        </div>`;
    }

    html += `</div>`;
    document.getElementById('resultsInner').innerHTML = html;

    /* Trigger animations after paint */
    requestAnimationFrame(() => {
      setTimeout(() => { document.getElementById('gradeDisplay').classList.add('in'); }, 100);
      setTimeout(() => {
        document.getElementById('scoreRight').classList.add('in');
        countUp(document.getElementById('scoreCounter'), data.totalScore);
        document.getElementById('meterFill').style.width = data.totalScore + '%';
      }, 250);
      setTimeout(() => { document.getElementById('statsRow').classList.add('in'); }, 400);
      setTimeout(() => { document.getElementById('catScoresRow').classList.add('in'); }, 500);
      setTimeout(() => { document.getElementById('pdfLink').classList.add('in'); }, 600);
      setTimeout(() => { document.getElementById('cardsLabel').classList.add('in'); }, 650);
      setTimeout(() => { document.getElementById('cardStrip').classList.add('in'); }, 700);
      setTimeout(() => { document.getElementById('detailLabel').classList.add('in'); }, 800);
      setTimeout(() => { document.getElementById('resultRows').classList.add('in'); }, 850);
    });
  }

  /* ── Site audit ── */
  function runSiteAudit(url) {
    clearError();
    document.getElementById('auditBtn').disabled = true;
    const resultsSection = document.getElementById('results');
    resultsSection.style.display = 'none';
    resultsSection.classList.remove('visible');
    showProgressUI();
    document.getElementById('statusText').textContent = 'Starting crawl...';

    const es = new EventSource(`/crawl?url=${encodeURIComponent(url)}`);
    es.onmessage = (e) => {
      const evt = JSON.parse(e.data);
      if (evt.type === 'progress') {
        const pct = Math.min(Math.round((evt.crawled / evt.total) * 100), 99);
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('statusText').textContent = `Crawling page ${evt.crawled + 1} — ${evt.url}`;
      } else if (evt.type === 'done') {
        es.close();
        document.getElementById('progressFill').style.width = '100%';
        document.getElementById('statusText').textContent = 'Done.';
        setTimeout(() => {
          document.getElementById('statusLine').style.display = 'none';
          document.getElementById('progressTrack').style.display = 'none';
          renderSiteResults({ ...evt, siteUrl: url });
          resultsSection.style.display = 'block';
          requestAnimationFrame(() => {
            resultsSection.scrollIntoView({ behavior: 'smooth' });
            requestAnimationFrame(() => resultsSection.classList.add('visible'));
          });
          document.getElementById('auditBtn').disabled = false;
        }, 600);
      } else if (evt.type === 'error') {
        es.close();
        document.getElementById('statusLine').style.display = 'none';
        document.getElementById('progressTrack').style.display = 'none';
        showError(evt.message);
        document.getElementById('auditBtn').disabled = false;
      }
    };
    es.onerror = () => {
      es.close();
      document.getElementById('statusLine').style.display = 'none';
      document.getElementById('progressTrack').style.display = 'none';
      showError('Connection lost during crawl.');
      document.getElementById('auditBtn').disabled = false;
    };
  }

  function renderSiteResults({ pageCount, results, siteUrl, pdfFile }) {
    const checksWithFail = results.filter(r => r.fail.length > 0).length;
    const checksWarnOnly = results.filter(r => r.fail.length === 0 && r.warn.length > 0).length;
    const checksAllPass  = results.filter(r => r.fail.length === 0 && r.warn.length === 0).length;

    // Site health score: per-check weighted average (pass=100, warn=50, fail=0)
    const siteScore = results.length ? Math.round(
      results.reduce((sum, r) => {
        const t = r.pass.length + r.warn.length + r.fail.length;
        return sum + (t ? (r.pass.length + r.warn.length * 0.5) / t * 100 : 100);
      }, 0) / results.length
    ) : 0;
    const grade  = letterGrade(siteScore);
    const gColor = gradeColor(siteScore);

    // Sort by category for the breakdown
    const sorted = [...results].sort((a, b) => categoryOrder(a.name) - categoryOrder(b.name));

    // Top 7 issues by fail count
    const topIssues = [...results].filter(r => r.fail.length > 0)
      .sort((a, b) => b.fail.length - a.fail.length).slice(0, 7);

    function pct(n) { return Math.round(n / (pageCount || 1) * 100); }

    let html = `
      <div class="site-results-wrap">
        <div class="site-results-header">
          <strong>${pageCount} page${pageCount !== 1 ? 's' : ''} crawled</strong>
          <span>·</span><span>${esc(siteUrl)}</span>
        </div>

        <div class="site-grade-block">
          <div class="site-grade-letter" style="color:${gColor}">${grade}</div>
          <div class="site-grade-score" style="color:${gColor}">${siteScore}/100</div>
          <div class="site-grade-label">Site Health Score</div>
        </div>

        <div class="site-summary-stats">
          <div class="site-stat-cell site-stat-fail">
            <div class="site-stat-n">${checksWithFail}</div>
            <div class="site-stat-l">checks with fails</div>
          </div>
          <div class="site-stat-cell site-stat-warn">
            <div class="site-stat-n">${checksWarnOnly}</div>
            <div class="site-stat-l">warnings only</div>
          </div>
          <div class="site-stat-cell site-stat-pass">
            <div class="site-stat-n">${checksAllPass}</div>
            <div class="site-stat-l">all-passing</div>
          </div>
        </div>

        ${pdfFile ? `<div style="text-align:center">
          <a class="pdf-link in" href="/download" download>
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Download PDF Report
          </a>
        </div>` : ''}`;

    // Top Issues summary
    if (topIssues.length) {
      html += `<div class="detail-label in">Top Issues</div><div class="result-rows in">`;
      topIssues.forEach((r, i) => {
        const cat = resultCategory(r.name);
        const displayName = r.name.replace(/^\[(Technical|Content|AEO|GEO)\]\s*/, '');
        html += `
          <div class="result-row">
            <div class="row-status fail">${statusIcon('fail')}</div>
            <div>
              <div class="site-issue-name">${esc(displayName)}</div>
              <div class="site-issue-cat cat-${cat}">${CAT_LABELS[cat].short}</div>
              ${r.recommendation ? `
                <button class="rec-btn" onclick="toggleSiteRec('top${i}')">+ recommendation</button>
                <div class="row-rec" id="siteRectop${i}">${esc(r.recommendation)}</div>` : ''}
            </div>
            <div class="site-top-pct">${pct(r.fail.length)}%<div style="font-size:9px;color:var(--muted);font-weight:400;margin-top:2px">of pages</div></div>
          </div>`;
      });
      html += `</div>`;
    }

    // Issue Breakdown grouped by category
    const issueResults = sorted.filter(r => r.fail.length > 0 || r.warn.length > 0);
    if (issueResults.length) {
      html += `<div class="detail-label in" style="margin-top:32px">Issue Breakdown</div><div class="result-rows in">`;
      let lastCat = null;
      issueResults.forEach((r, i) => {
        const cat = resultCategory(r.name);
        if (cat !== lastCat) {
          html += `<div class="detail-cat-header cat-${cat}">${CAT_LABELS[cat].short} <span class="cat-full">— ${CAT_LABELS[cat].full}</span></div>`;
          lastCat = cat;
        }
        const worstStatus = r.fail.length > 0 ? 'fail' : 'warn';
        const displayName = r.name.replace(/^\[(Technical|Content|AEO|GEO)\]\s*/, '');
        const totalAffected = r.fail.length + r.warn.length;
        const affectedUrls = [...r.fail.slice(0, 5), ...r.warn.slice(0, 5)];
        const moreCount = totalAffected - affectedUrls.length;
        html += `
          <div class="result-row">
            <div class="row-status ${worstStatus}">${statusIcon(worstStatus)}</div>
            <div>
              <div class="site-issue-name">${esc(displayName)}</div>
              <div class="site-issue-cat cat-${cat}">${CAT_LABELS[cat].short}</div>
              ${r.recommendation ? `
                <button class="rec-btn" onclick="toggleSiteRec('issue${i}')">+ recommendation</button>
                <div class="row-rec" id="siteRecissue${i}">${esc(r.recommendation)}</div>` : ''}
              <button class="rec-btn" id="siteRowBtn${i}" data-total="${totalAffected}" onclick="toggleSiteRow(${i})">+ ${totalAffected} page${totalAffected !== 1 ? 's' : ''} affected</button>
              <div class="site-issue-urls" id="siteRow${i}">
                ${affectedUrls.map(u => `<div>${esc(u)}</div>`).join('')}
                ${moreCount > 0 ? `<div style="font-style:italic">…and ${moreCount} more</div>` : ''}
              </div>
            </div>
            <div class="site-issue-counts">
              ${r.fail.length > 0 ? `<span class="site-count-fail">${r.fail.length}/${pageCount} <span style="font-size:9px;font-weight:400">(${pct(r.fail.length)}%)</span></span>` : ''}
              ${r.warn.length > 0 ? `<span class="site-count-warn">${r.warn.length}/${pageCount} <span style="font-size:9px;font-weight:400">(${pct(r.warn.length)}%)</span></span>` : ''}
            </div>
          </div>`;
      });
      html += `</div>`;
    }

    // What's Working
    const passingChecks = sorted.filter(r => r.fail.length === 0 && r.warn.length === 0);
    if (passingChecks.length) {
      html += `<button class="site-working-toggle" onclick="toggleSiteWorking()">✓ What's Working (${passingChecks.length} checks)</button>
        <div class="site-working-rows" id="siteWorkingRows"><div class="result-rows in">`;
      let lastCat = null;
      passingChecks.forEach(r => {
        const cat = resultCategory(r.name);
        if (cat !== lastCat) {
          html += `<div class="detail-cat-header cat-${cat}">${CAT_LABELS[cat].short} <span class="cat-full">— ${CAT_LABELS[cat].full}</span></div>`;
          lastCat = cat;
        }
        const displayName = r.name.replace(/^\[(Technical|Content|AEO|GEO)\]\s*/, '');
        html += `
          <div class="result-row">
            <div class="row-status pass">${statusIcon('pass')}</div>
            <div>
              <div class="site-issue-name">${esc(displayName)}</div>
              <div class="site-issue-cat cat-${cat}">${CAT_LABELS[cat].short}</div>
            </div>
            <div class="site-issue-counts"><span class="site-count-pass">${r.pass.length}/${pageCount}</span></div>
          </div>`;
      });
      html += `</div></div>`;
    }

    html += `</div>`;
    document.getElementById('resultsInner').innerHTML = html;
  }

  function toggleSiteRow(i) {
    const el   = document.getElementById('siteRow' + i);
    const btn  = document.getElementById('siteRowBtn' + i);
    const open = el.style.display === 'block';
    el.style.display = open ? 'none' : 'block';
    if (btn) {
      const total = btn.dataset.total;
      const noun  = total !== '1' ? 'pages' : 'page';
      btn.textContent = open ? `+ ${total} ${noun} affected` : `− ${total} ${noun} affected`;
    }
  }

  function toggleSiteRec(id) {
    const el  = document.getElementById('siteRec' + id);
    const btn = el.previousElementSibling;
    const open = el.style.display === 'block';
    el.style.display = open ? 'none' : 'block';
    btn.textContent  = open ? '+ recommendation' : '− recommendation';
  }

  function toggleSiteWorking() {
    const el = document.getElementById('siteWorkingRows');
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
  }

  function toggleRec(i) {
    const el  = document.getElementById('rec' + i);
    const btn = el.previousElementSibling;
    const open = el.style.display === 'block';
    el.style.display = open ? 'none' : 'block';
    btn.textContent  = open ? '+ recommendation' : '− recommendation';
  }

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runAudit();
  });
  document.getElementById('auditBtn').addEventListener('click', runAudit);
</script>
</body>
</html>
